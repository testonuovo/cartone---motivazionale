<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Cartone Animato Motivazionale</title>
<style>
  body { margin: 0; background: blue; }
  canvas { display: block; margin: auto; background: blue; }
</style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<!-- Musica di sottofondo -->
<audio id="bgMusic" loop>
  <source src="Viva Forever.mp3" type="audio/mpeg">
</audio>

<!-- Suono salto -->
<audio id="jumpSound">
  <source src="Viva Forever.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Musica
const music = document.getElementById("bgMusic");
music.volume = 0.3;

// Suono salto
const jumpSound = document.getElementById("jumpSound");

// Parte al primo click
document.addEventListener("click", () => {
  music.play();
}, { once: true });

// Sprite guerriero
const warriorImg = new Image();
warriorImg.src = "https://i.ibb.co/s9v5wFmN/image-1003527139519194.jpg";

// Posizioni
let warriorX = 50;
let warriorY = 300;
let jump = false;
let jumpHeight = 0;
let speed = 2;

// Ostacoli
const obstacles = [
  {x: 400, y: 300, width: 50, height: 50},
  {x: 600, y: 300, width: 50, height: 50},
  {x: 750, y: 300, width: 50, height: 50}
];

// Nuvole
const clouds = [
  {x: 50, y: 50, width: 100, height: 40},
  {x: 300, y: 80, width: 120, height: 50},
  {x: 600, y: 60, width: 80, height: 30}
];

// Messaggi motivazionali
const messages = [
  "Respira… resta calmo.",
  "Ogni ostacolo è un'opportunità.",
  "La tua forza è dentro di te.",
  "Non mollare mai!",
  "Continua a lottare!",
  "Non ti arrendere"
];

let messageIndex = 0;
let messageTimer = 0;

// Controllo tastiera
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowRight") warriorX += speed;
  if(e.key === "ArrowLeft") warriorX -= speed;
  if(e.key === " " && !jump){ // barra spaziatrice per saltare
    jump = true;
    jumpSound.play();
  }
});

// Avvio animazione
warriorImg.onload = () => {
  draw();
};

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Sfondo cielo
  ctx.fillStyle = "#87ceeb";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Nuvole animate
  ctx.fillStyle = "white";
  clouds.forEach(cloud => {
    ctx.fillRect(cloud.x, cloud.y, cloud.width, cloud.height);
    cloud.x -= 0.5;
    if (cloud.x + cloud.width < 0) cloud.x = canvas.width;
  });

  // Terra
  ctx.fillStyle = "#228B22";
  ctx.fillRect(0, 350, canvas.width, 50);

  // Ostacoli
  ctx.fillStyle = "red";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  // Guerriero
  ctx.drawImage(warriorImg, warriorX, warriorY - jumpHeight, 50, 50);

  // Salto automatico se vicino a ostacolo
  let nextObstacle = obstacles.find(o => warriorX + 50 < o.x);
  if(nextObstacle){
    if(warriorX + 50 >= nextObstacle.x){
      jump = true;
      jumpSound.play();
    }
  }

  // Salto
  if(jump){
    if(jumpHeight < 100) jumpHeight += 5;
    else jump = false;
  } else if(jumpHeight > 0){
    jumpHeight -= 5;
  }

  // Testo motivazionale
  ctx.fillStyle = "white";
  ctx.font = "24px Arial";
  ctx.fillText(messages[messageIndex], 200, 50);

  // Cambio messaggio ogni 120 frame
  messageTimer++;
  if(messageTimer >= 120){
    messageIndex = (messageIndex + 1) % messages.length;
    messageTimer = 0;
  }

  requestAnimationFrame(draw);
}
</script>

</body>
</html>
